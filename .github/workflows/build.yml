name: Build RustDesk Server

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libssl-dev pkg-config

      - uses: Swatinem/rust-cache@v2
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        with:
          prefix-key: server-${{ matrix.target }}

      - name: Build (native)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo build --release

      - name: Build (cross)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cross build --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-server-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/hbbs
            target/${{ matrix.target }}/release/hbbr
            target/${{ matrix.target }}/release/rustdesk-utils
            target/release/hbbs
            target/release/hbbr
            target/release/rustdesk-utils

  build-windows:
    name: Windows (x86_64)
    runs-on: windows-2022
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: server-windows

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rustdesk-server-windows-x86_64
          path: |
            target/release/hbbs.exe
            target/release/hbbr.exe
            target/release/rustdesk-utils.exe
